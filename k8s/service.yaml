apiVersion: v1
kind: Service
metadata:
  name: kidney-disease-classifier-svc
  namespace: ml-ops
  labels:
    app: kidney-disease-classifier
spec:
  type: NodePort
  selector:
    app: kidney-disease-classifier
  ports:
    - protocol: TCP
      port: 80          # Port exposed inside the cluster
      targetPort: 8080  # Port the Flask app listens on inside the container
      nodePort: 30080   # Port accessible on Minikube node (http://<minikube-ip>:30080)
